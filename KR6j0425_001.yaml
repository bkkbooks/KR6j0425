body:
  text: 我今依真言次第法門說行人先當從阿闍梨得受灌頂及親傳受已乃再入持明悉地灌頂具足慈悲行無緣慈憐愍一切苦厄有情作此念誦誓當挍一切恐怖厄難衆生若衆生苦厄難時隨其處或香塗或撚粉作壇若常念者應須精室如法建立道場一切如前法行人先興八種心方可持法第一慈悲心二無垢心三無我所心四無勝附心五有平等心六無怨害心七有哀愍心八無貪利心如是之人萬可傳受如是等堪同作法若非此者惟應自作令法得成若遍數未終不得中間輒共人語使有間斷即法失驗未作法時先當明告若自作念誦亦勿間斷行者若入道場時應䖍誠作禮即金剛合掌至心想於十方諸佛及文殊大聖無量菩薩金剛密迹一切賢聖等前一一自身而禮聖衆普禮一切佛菩薩金剛等真言曰唵一薩嚩轉舌怛他引蘗多二迦耶嚩訖唧二合多三嚩無撥反折羅二合鉢羅二合梅輕呼四曼祖室利二合嚩嗓那二合南五迦嚕弭又心密明曰唵引嚩日囉二合微微一反多先合金剛掌十度外相交五輪皆委地至誠恭敬禮復以長跪坐合掌似合蓮觀身如水精吽字如三處想成五智杵所謂內金剛而為不壞體然處誠奉請一切諸聖尊誦是四句偈稽首無上法醫王難教能救慈悲主我今歸命恭敬請唯願速來降道場如是三重請作前啓白言二手蓮華合復誦淨三業令身器清淨用加持五處額兩肩心喉念彼真言曰唵引娑嚩二合婆去縛戍馱引薩嚩達磨娑嚩二合戍度𤚥引已淨三業竟結佛三昧耶定慧合蓮掌開合二火峯二風屈上節二空捻風根與印當額前諦觀一切佛一一分明見住在虗空中念彼真言曰佛部三昧耶定慧內合拳二空皆並竪諦觀一切佛由如對目前隨念召請尊雙拳而並召真言曰唵引一爾慈以反曩匿而翼反迦半音娑嚩二合賀引三遍或七遍復結蓮華部祕密三昧耶印相亦如前左入右舒出三誦三召請安右而散之念彼真言曰唵引一阿引一嚧力迦半音娑嚩二合賀復次金剛部微妙三昧契前契改空輪右入左竪招專心存念尊念彼真言曰唵引一縛日羅二合地力二合迦半音呼娑嚩二合賀佛部印安額蓮華右耳邊金剛左耳邊同於頂上散復次被甲契檀慧及戒方相叉內入掌忍願頭相合進力曲如鉤外附二火後禪智並直竪由如嚩折羅念加身五處額右肩并左心喉散頂門念彼真言曰唵引斫羯羅二合襪轉舌呼㗚底二合鉢羅二合賒弭多引羅捺羅引二合羅引捺羅二合婆去娑摩二合捺倉𭡄反路引慧抳二合娑路乞叉二合洛乞娑二合鋡吽發吒娑嚩二合訶次說金剛地界橛印定手方願度雙入戒忍門方祕絞戒後入於檀戒間願絞入忍進檀慧與進力禪智各相合三旋下丁之即念真言曰唵引枳里枳里嚩日羅二合嚩曰里二合步𠷈滿二合馱滿馱吽引發吒復說金剛墻界印準前地界印𢷡開禪智竪右旋如墻院隨誦而轉之心想金剛墻念彼真言曰唵引薩羅薩羅嚩日羅二合鉢羅二合迦羅引吽發吒復次虗空藏十度外相交進力𨄬如寶想成妙樓閣上有大蓮華諦心觀本尊住於寶帳中周匝幢幡蓋天衣香雲海遍滿於虗空眷屬中圍繞誦是真言曰唵引誐誐曩三婆去引嚩嚩無撥反曰囉二合斛引次結車輅印定慧仰相叉以右押於左禪智捻進力最下弟一文旋轉送向前想成寶車輅念彼真言曰唵引觀魯都魯吽引三遍或七遍想尊乘車輅徐來降道場住於虗空中待請而來入不違本誓願念彼真言曰曩莫悉底哩野四合地尾二合迦引南怛他引蘖跢南引一唵引嚩折朗二合祇你也二合引阿引揭羅灑二合野娑嚩二合引賀引由此真言力及結契相應能召於本尊并及餘眷屬降臨道場所施願與行人欲結車輅時先當淨道路二手捧香爐念修祕密句淨治虗中路後乃請聖尊想香至彼宮念彼真言曰唵引素悉地揭哩入嚩二合理哆難多慕引羅多去曳入嚩二合攞滿他滿他賀喃吽發吒若作此妙法其空中關籥悉皆自開解亦成辟除障乃至清淨等乃成驚覺尊眷屬并親近次先作奉請印契誦後明召集諸聖賢入曼荼羅內請召真言曰或三或七遍召請入道場殷勤陳所請復請妙吉祥密迹金剛主定慧合蓮掌二火絞水輪峯端捻甲背二風屈相跓二空並竪之風模押空峯誦密言三召曩莫三曼多沒馱引南上引係係俱摩羅迦尾目訖底丁以反鉢他悉體二合地以反多娑麼二合羅娑麼二合羅鉢羅二合底枳然二合娑嚩二合賀復次部明王辟除諸障者定慧合蓮掌水風並下垂俱入滿月間空並離風節當心誦明句七遍舉額齊左轉為辟除右旋成結界一切作障者驅散無有礙威光如劫火忿怒大恐怖三面現六臂操持越棒瓶蓮華及數珠唵引一度曩度曩二麼他麼他三訶曩訶曩四賀野擬里二合縛無可反吽發吒半音又心明曰唵引一阿引密㗚二合覩納婆二合縛𤙖引發吒半音呼由是真言故及以印加持能令諸障除行人小施功速獲得成就復次結上界金剛網羅契如前墻印相開空捻風根頂平上覆安令密加七遍隨誦右旋轉三匝應舞儀散分向下垂想納彌覆界墻外至於地一切不能穿觀成如金剛念彼真言曰唵引一尾娑普二合羅捺羅二合乞叉二合嚩折羅二合半惹羅𤙖引發吒半音復次火院印密縫焰暉光周匝網外圍赫奕劫火熾如風右旋達怖畏諸惡魔一切設都嚕無能為惱害行人堅住觀念彼真言曰唵引一阿三莾擬你訶囉𤙖引發吒半音呼三遍或七遍諦想作加持觀中光焰暉動然焰輝赫令法無不成復明獻閼伽定慧並仰開地水火合峯風屈如商佉二空捻風下想成衆寶池清徹底金砂念彼真言曰曩莫三曼多勃上馱引南引誐誐曩三摩引三摩上娑縛二合賀三遍或七遍心想寶池中蓮華莟萏開遍浴諸聖衆先浴本尊足次浴諸賢聖又浴衆聖天令我根塵淨復次師子座其契如後明定慧地水交相叉入掌內二火合峯竪風屈捻二空空並仰前出由如師子勢想上有蓮華念彼真言曰唵引阿佐攞尾羅野𤙖引次陳普供養十度金剛合二風如寶形塗香華食燈運想如雲海幢幡衆妓樂華蓋妙天衣流散遍虗空供養增福聚食是真言句而以獻諸尊供養真言曰曩莫三曼多引勃馱引南引唵引薩羅縛二合他引缺溫娜蘖二合帝娑頗二合羅𠰘𤚥誐誐曩釰娑縛二合引訶由是供養故當獲無等利能成衆事業資糧從是生復次明讚嘆不解前印契改寶而交合梵音誦讚言令衆聖歡喜念是密言曰唵縛日羅二合底丁以反乞襯拏二合摩訶引夜引曩一縛日羅二合勾引舍摩賀引庾馱引二曼祖引唎野二合三室利二合引縛日羅二合儼鼻引唎野二合三縛日羅二合沒弟曩謨引率都二合帝引四又復有漢語大讚歸命密迹主摧伏諸魔者童真法王子具普賢衆行住是本有身無始無終寂妙用施諸願降怨害三毒改劫故修行而於三界中重說祕明教為護有情類設大方便門極救諸含靈令超生死輪從凡入佛地行者作是語讚詠於本尊至心誦三遍令大聖歡喜行人所求願一切速圓滿復次聖文殊請召童子印慧手結為拳舒風如鉤狀七遍而三召即說真言曰曩莫入三曼多沒馱引南引阿羯羅灑二合野薩鑁引矩嚕阿然三矩忙引羅寫四娑嚩二合賀復次計設尼印相如後說智慧羽為拳火風相合竪由同刀標相念彼密言曰曩莫三曼多沒馱引南上引係係矩忙𭌆計引二娜耶枳攘二合難娑麼二合羅沙麼二合鉢囉二合底然二合娑嚩二合賀引復次尊右方救護慧童子左手金剛拳端坐安腰側右舒五輪直當以掩其心𢷡堅於空輪念彼真言曰曩莫三曼多沒馱引南上引一係摩訶引摩訶引二娑麼二合羅鉢羅二合底枳然二合娑縛二合賀烏波計室尼智慧手為拳而申火輪直風屈指中節如同戟標相說彼真言曰曩莫三曼多沒馱引南引上一類娜夜枳攘二合難二係矩忙𭌆計三娑嚩二合訶復次光網尊內眷屬童子印契如後說三昧手為拳風輪舉如鉤為攝諸含識令住解脫地即說真言曰曩莫三曼多沒馱引南上引係係矩忙羅忙耶蘖多娑嚩二合婆去引嚩悉體二合他以反哆娑嚩二合賀復次地慧幢內眷之標幟三昧手為拳而舒地水輪直竪加幢相說是密言曰曩莫三曼多沒馱引南上一係娑麼二合羅二枳壤二合曩計都引一婆嚩二合賀引次復無垢光矩忙囉密主如前三昧手舒上一切輪悉皆徹屈之如佛身光明其焰徹暉照稱念彼真言曰曩莫三曼多沒馱引南一上引係係矩忙引羅微質怛囉二合蘖底矩忙引羅麼弩娑麼二合羅娑嚩二合賀引復不思儀慧印相如後陳定慧內相叉一令為拳印二風別屈舒屈二節對之令甲急相背二空並直竪名為拳教者復說密言曰曩莫三曼多勃馱南上引一係係引緊旨慈以反羅拽徙阿去急呼尾娑麼二合也儜曳娑嚩二合賀引爾時修行者安住慈愍心為一切有情發大弘誓願至誠起殷敬觀想於本尊金色放光明乘師子王座操持智慧釰左執青蓮華華臺立智杵首髻八智尊暉光遍十方如對行人目文殊根本契從師密授之次當取念珠盤在於掌內定慧合蓮相當口用加持祕密珠明曰唵引吠嚧左曩麼攞娑嚩二合賀引加持七遍已千轉三易珠空地對捻珠隨誦移三匝誦八字明句一千或一萬字字分明呼端坐諦觀之念念勿間斷數終住觀智并三摩地門在於滿月中布字為種智或作大日觀圓輝亦復然所有諸功德施一切衆生皆得成佛道復說差別事三時或四時無令有退轉若為息災故定夜以之初若求福智門後夜而起首降伏日正午愛敬欲眠時鉤召亦同前念訖還珠契亦同悉地法本尊數終已依前念內眷八尊如舊次讚歎奉香華閼伽再奉獻發願并勸請解界用火院發遣奉送之三部再護身被甲如初作焰曼德作衛大刀觸加持禮拜衆聖賢隨意經行出若住山林中頭陀居曠野王難遭枷獄橫事恐怖時疾病鬼神殃暗夜行怖懼修道被魔嬈鬪諍家不和諸毒欲來傷如前多種難常持八祕明無惡不殄除印契差別門要當師密受若在曼荼羅正對尊前恣頻申動支節噓吹大捶頭穢嗌噴鳴聲涕唾及咳嗽如是之等事制之勿憍慢大教阿闍梨深行巧慧者欲求大悉地應須頻護摩每滿三洛叉一度火供養若得三相現暖煙及光明釰中發大聲梵音師子吼雷鳴微妙響鐘鼓雅歌聲種種說法音行人得悉地護摩如教法微細明解之小分不相應衆惡皆來集三俱眠數滿常得見文殊心通解脫門智慧不可測世出世間願所求皆滿足長慶四年八月三十日東塔院青龍寺沙門義雲法金剛與中天三藏菩提仙同譯筆結偈潤文僧義雲寫勘終記之耳
